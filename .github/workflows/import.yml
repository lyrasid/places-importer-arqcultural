name: Import Places

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run Import Script
        run: node import.js

      - name: Commit dataset files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add places.json stats.json
          git commit -m "chore: update places dataset" || echo "No changes to commit"
          git push
